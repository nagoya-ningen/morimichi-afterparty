<h1>森道 After party は移転しました</h1>
<p>「わたしの森道」アプリに統合され、アプリ内の「ひろば」になりました。
投稿・リアクションなどのデータはすべてそのまま引き継がれています。</p>
<p>3秒後に自動で移動します。移動しない場合は
<a href="https://nagoya-ningen.github.io/watashi-no-morimichi/party.html">こちら</a>。</p>
<script>
/* 旧PWAのService Worker・キャッシュを掃除してから新URLへ。
   （旧SWが残っていると古い画面が表示され続けるため） */
(function () {
  var dest = 'https://nagoya-ningen.github.io/watashi-no-morimichi/party.html';
  var go = function () { window.location.replace(dest); };
  var t = setTimeout(go, 2500);
  try {
    var jobs = [];
    if ('serviceWorker' in navigator) {
      jobs.push(navigator.serviceWorker.getRegistrations()
        .then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); }));
    }
    if (window.caches && caches.keys) {
      jobs.push(caches.keys().then(function (ks) {
        return Promise.all(ks.filter(function (k) { return k.indexOf('mma-') === 0; })
          .map(function (k) { return caches.delete(k); }));
      }));
    }
    Promise.all(jobs).then(function () { clearTimeout(t); go(); })
      .catch(function () {});
  } catch (e) {}
})();
</script>
